server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API + server-rendered guide pages to the Spring Boot backend,
    # so the whole site is served from one origin (no CORS needed in prod).
    location /api/        { proxy_pass http://api:8080; }
    location /learn       { proxy_pass http://api:8080; }
    location /sitemap.xml { proxy_pass http://api:8080; }
    location /llms.txt    { proxy_pass http://api:8080; }

    # Single-page app: everything else routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
