services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reflex
      POSTGRES_USER: reflex
      POSTGRES_PASSWORD: reflex
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reflex"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/reflex
      DB_USER: reflex
      DB_PASSWORD: reflex
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  dbdata:
