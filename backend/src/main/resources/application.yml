spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reflex}
    username: ${DB_USER:reflex}
    password: ${DB_PASSWORD:reflex}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  cors-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  base-url: ${BASE_URL:http://localhost:3000}
